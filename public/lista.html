<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<title>Lista de Atendidos</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<div class="sidebar">

<div class="logo">
<img src="images/logo.png">
</div>

<a href="dashboard.html">Dashboard</a>
<a href="cadastro.html">Cadastro Social</a>
<a href="lista.html">Lista de Atendidos</a>

</div>

<div class="content">

<div class="container-box">

<h1>Lista de Atendidos</h1>

<input
id="busca"
class="form-control mb-4"
placeholder="Buscar"
onkeyup="listar()"
>

<table class="table table-bordered">

<thead class="table-dark">

<tr>

<th>Nome</th>
<th>CPF</th>
<th>Cidade</th>
<th>Ações</th>

</tr>

</thead>

<tbody id="tabela"></tbody>

</table>

</div>

</div>

<script>

const API =
"https://sistema-ong.onrender.com";

let atendidos = [];

async function listar(){

  const resposta = await fetch(
    API + "/atendidos"
  );

  atendidos = await resposta.json();

  const busca = document
    .getElementById("busca")
    .value
    .toLowerCase();

  let html = "";

  atendidos.forEach((item) => {

    const texto = `
      ${item.nome}
      ${item.cpf}
      ${item.cidade}
    `.toLowerCase();

    if(texto.includes(busca)){

      html += `

      <tr>

        <td>${item.nome}</td>
        <td>${item.cpf}</td>
        <td>${item.cidade}</td>

        <td>

          <button
            class="btn btn-warning btn-sm"
            onclick="editar(${item.id})"
          >
            Editar
          </button>

          <button
            class="btn btn-danger btn-sm"
            onclick="excluirCadastro(${item.id})"
          >
            Excluir
          </button>

        </td>

      </tr>

      `;

    }

  });

  document.getElementById("tabela").innerHTML = html;

}

function editar(id){

  window.location.href =
    "cadastro.html?id=" + id;

}

async function excluirCadastro(id){

  const confirmar = confirm(
    "Deseja excluir?"
  );

  if(!confirmar) return;

  await fetch(

    API + "/atendidos/" + id,

    {

      method: "DELETE"

    }

  );

  listar();

}

listar();

</script>

</body>

</html>
