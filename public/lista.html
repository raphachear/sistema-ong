<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<title>Lista de Atendidos</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<div class="sidebar">

<div class="logo">
<img src="images/logo.png">
</div>

<a href="dashboard.html">Dashboard</a>
<a href="cadastro.html">Cadastro Social</a>
<a href="lista.html">Lista de Atendidos</a>

</div>

<div class="content">

<div class="container-box">

<h1>Lista de Atendidos</h1>

<input
id="busca"
class="form-control mb-4"
placeholder="Buscar por nome, CPF ou cidade"
onkeyup="listar()"
>

<table class="table table-bordered table-hover">

<thead class="table-dark">

<tr>

<th>Nome</th>
<th>CPF</th>
<th>Cidade</th>
<th>Ações</th>

</tr>

</thead>

<tbody id="tabela">

</tbody>

</table>

</div>

</div>

<!-- MODAL -->

<div class="modal fade" id="modalFicha" tabindex="-1">

<div class="modal-dialog modal-xl">

<div class="modal-content">

<div class="modal-header">

<h5 class="modal-title">
Ficha Social
</h5>

<button
type="button"
class="btn-close"
data-bs-dismiss="modal"
></button>

</div>

<div class="modal-body" id="conteudoFicha">

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

let atendidos = [];

async function listar(){

  const resposta = await fetch(
    "https://sistema-ong.onrender.com/atendidos"
  );

  atendidos = await resposta.json();

  const busca = document
    .getElementById("busca")
    .value
    .toLowerCase();

  let html = "";

  atendidos.forEach((item) => {

    const textoBusca = `
      ${item.nome}
      ${item.cpf}
      ${item.cidade}
    `.toLowerCase();

    if(textoBusca.includes(busca)){

      html += `

      <tr>

        <td>${item.nome}</td>
        <td>${item.cpf}</td>
        <td>${item.cidade}</td>

        <td>

          <button
            class="btn btn-info btn-sm"
            onclick="visualizar(${item.id})"
          >
            Visualizar
          </button>

          <button
            class="btn btn-primary btn-sm"
            onclick="gerarPDF(${item.id})"
          >
            PDF
          </button>

        </td>

      </tr>

      `;

    }

  });

  document.getElementById("tabela").innerHTML = html;

}

function visualizar(id){

  const item = atendidos.find(a => a.id == id);

  document.getElementById("conteudoFicha").innerHTML = `

    <h3>${item.nome}</h3>

    <hr>

    <div class="row">

      <div class="col-md-6">
        <b>CPF:</b> ${item.cpf}
      </div>

      <div class="col-md-6">
        <b>RG:</b> ${item.rg}
      </div>

      <div class="col-md-6 mt-3">
        <b>Telefone:</b> ${item.telefone1}
      </div>

      <div class="col-md-6 mt-3">
        <b>Estado Civil:</b> ${item.estado_civil}
      </div>

      <div class="col-md-12 mt-3">
        <b>Endereço:</b>
        ${item.rua}, ${item.numero}
      </div>

      <div class="col-md-4 mt-3">
        <b>Bairro:</b> ${item.bairro}
      </div>

      <div class="col-md-4 mt-3">
        <b>Cidade:</b> ${item.cidade}
      </div>

      <div class="col-md-4 mt-3">
        <b>Estado:</b> ${item.estado}
      </div>

      <div class="col-md-12 mt-4">
        <b>Motivo do atendimento:</b>
        <p>${item.motivo || ""}</p>
      </div>

      <div class="col-md-12 mt-4">
        <b>Observações:</b>
        <p>${item.observacoes || ""}</p>
      </div>

    </div>

  `;

  const modal = new bootstrap.Modal(
    document.getElementById("modalFicha")
  );

  modal.show();

}

async function gerarPDF(id){

  const item = atendidos.find(a => a.id == id);

  const { jsPDF } = window.jspdf;

  const doc = new jsPDF();

  let y = 20;

  doc.setFontSize(18);

  doc.text("FICHA SOCIAL - ONG", 65, y);

  y += 20;

  doc.setFontSize(12);

  doc.text("Nome: " + item.nome, 20, y);
  y += 10;

  doc.text("CPF: " + item.cpf, 20, y);
  y += 10;

  doc.text("RG: " + item.rg, 20, y);
  y += 10;

  doc.text("Telefone: " + item.telefone1, 20, y);
  y += 10;

  doc.text("Cidade: " + item.cidade, 20, y);
  y += 10;

  doc.text("Estado: " + item.estado, 20, y);

  y += 20;

  doc.text("Motivo:", 20, y);

  y += 10;

  doc.text(item.motivo || "", 20, y);

  y += 40;

  doc.line(20, y, 80, y);
  doc.line(120, y, 180, y);

  y += 5;

  doc.text("Responsável ONG", 25, y);
  doc.text("Atendido", 140, y);

  doc.save("ficha-social.pdf");

}

listar();

</script>

</body>

</html>
