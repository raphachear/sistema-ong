<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<title>Cadastro Social</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="sidebar">

<div class="logo">
<img src="images/logo.png">
</div>

<a href="dashboard.html">Dashboard</a>
<a href="cadastro.html">Cadastro Social</a>
<a href="lista.html">Lista de Atendidos</a>

</div>

<div class="content">

<div class="container-box">

<h1>Formulário Social</h1>

<!-- IDENTIFICAÇÃO -->

<h3 class="mt-4">1. Identificação</h3>

<div class="row">

<div class="col-md-6">
<input id="nome" class="form-control mb-3" placeholder="Nome">
</div>

<div class="col-md-6">
<input id="filiacao" class="form-control mb-3" placeholder="Filiação">
</div>

<div class="col-md-3">
<input id="nascimento" type="date" class="form-control mb-3">
</div>

<div class="col-md-3">
<select id="sexo" class="form-control mb-3">
<option>Sexo</option>
<option>Feminino</option>
<option>Masculino</option>
</select>
</div>

<div class="col-md-3">
<input id="estado_civil" class="form-control mb-3" placeholder="Estado Civil">
</div>

<div class="col-md-3">
<input id="naturalidade" class="form-control mb-3" placeholder="Naturalidade">
</div>

<div class="col-md-4">
<input id="cor" class="form-control mb-3" placeholder="Cor/Raça">
</div>

<div class="col-md-4">
<input id="telefone1" class="form-control mb-3" placeholder="Telefone 1">
</div>

<div class="col-md-4">
<input id="telefone2" class="form-control mb-3" placeholder="Telefone 2">
</div>

<div class="col-md-3">
<input id="cep" class="form-control mb-3" placeholder="CEP" onblur="buscarCEP()">
</div>

<div class="col-md-6">
<input id="rua" class="form-control mb-3" placeholder="Rua">
</div>

<div class="col-md-3">
<input id="numero" class="form-control mb-3" placeholder="Número">
</div>

<div class="col-md-4">
<input id="bairro" class="form-control mb-3" placeholder="Bairro">
</div>

<div class="col-md-4">
<input id="cidade" class="form-control mb-3" placeholder="Cidade">
</div>

<div class="col-md-4">
<input id="estado" class="form-control mb-3" placeholder="Estado">
</div>

<div class="col-md-12">
<input id="complemento" class="form-control mb-3" placeholder="Complemento">
</div>

<div class="col-md-12">
<input id="referencia" class="form-control mb-3" placeholder="Ponto de Referência">
</div>

<div class="col-md-12">
<textarea id="motivo" class="form-control mb-3" placeholder="Motivo do atendimento"></textarea>
</div>

</div>

<!-- DOCUMENTAÇÃO -->

<h3 class="mt-4">2. Documentação</h3>

<div class="row">

<div class="col-md-4">
<input id="rg" class="form-control mb-3" placeholder="RG">
</div>

<div class="col-md-4">
<input id="cpf" class="form-control mb-3" placeholder="CPF">
</div>

<div class="col-md-4">
<input id="titulo_eleitor" class="form-control mb-3" placeholder="Título de Eleitor">
</div>

<div class="col-md-3">
<input id="zona" class="form-control mb-3" placeholder="Zona">
</div>

<div class="col-md-3">
<input id="secao" class="form-control mb-3" placeholder="Seção">
</div>

<div class="col-md-6">
<input id="carteira_trabalho" class="form-control mb-3" placeholder="Carteira de Trabalho">
</div>

<div class="col-md-4">
<input id="certidao" class="form-control mb-3" placeholder="Certidão">
</div>

<div class="col-md-4">
<input id="programa_federal" class="form-control mb-3" placeholder="Programa Federal">
</div>

<div class="col-md-4">
<input id="assistencia" class="form-control mb-3" placeholder="Assistência recebida">
</div>

</div>

<!-- PROFISSIONAL -->

<h3 class="mt-4">3. Situação Profissional</h3>

<div class="row">

<div class="col-md-6">
<input id="situacao_profissional" class="form-control mb-3" placeholder="Situação Profissional">
</div>

<div class="col-md-6">
<input id="tempo_desempregado" class="form-control mb-3" placeholder="Tempo desempregado">
</div>

</div>

<!-- HABITAÇÃO -->

<h3 class="mt-4">4. Condições Habitacionais</h3>

<div class="row">

<div class="col-md-4">
<input id="situacao_habitacional" class="form-control mb-3" placeholder="Situação Habitacional">
</div>

<div class="col-md-4">
<input id="tempo_moradia" class="form-control mb-3" placeholder="Tempo de Moradia">
</div>

<div class="col-md-4">
<input id="comodos" class="form-control mb-3" placeholder="Quantidade de cômodos">
</div>

<div class="col-md-4">
<input id="tipo_construcao" class="form-control mb-3" placeholder="Tipo de Construção">
</div>

<div class="col-md-4">
<input id="abastecimento_agua" class="form-control mb-3" placeholder="Abastecimento de Água">
</div>

<div class="col-md-4">
<input id="iluminacao" class="form-control mb-3" placeholder="Iluminação">
</div>

</div>

<!-- DESPESAS -->

<h3 class="mt-4">5. Despesas Familiares</h3>

<div class="row">

<div class="col-md-2">
<input id="medicamentos" class="form-control mb-3" placeholder="Medicamentos">
</div>

<div class="col-md-2">
<input id="gas" class="form-control mb-3" placeholder="Gás">
</div>

<div class="col-md-2">
<input id="alimentacao" class="form-control mb-3" placeholder="Alimentação">
</div>

<div class="col-md-2">
<input id="contas" class="form-control mb-3" placeholder="Contas">
</div>

<div class="col-md-4">
<input id="total_despesas" class="form-control mb-3" placeholder="Total despesas">
</div>

<div class="col-md-12">
<textarea id="outras_despesas" class="form-control mb-3" placeholder="Outras despesas"></textarea>
</div>

</div>

<!-- OBSERVAÇÕES -->

<h3 class="mt-4">6. Observações</h3>

<textarea id="observacoes" class="form-control mb-4" rows="6"></textarea>

<button class="btn btn-success w-100" onclick="cadastrar()">
Salvar Cadastro
</button>

</div>

</div>

<script>

async function buscarCEP(){

  const cep = document.getElementById("cep").value;

  const resposta = await fetch(
    `https://viacep.com.br/ws/${cep}/json/`
  );

  const dados = await resposta.json();

  document.getElementById("rua").value = dados.logradouro;
  document.getElementById("bairro").value = dados.bairro;
  document.getElementById("cidade").value = dados.localidade;
  document.getElementById("estado").value = dados.uf;

}

async function cadastrar(){

  const resposta = await fetch(
    "https://sistema-ong.onrender.com/atendidos",
    {

      method: "POST",

      headers:{
        "Content-Type":"application/json"
      },

      body: JSON.stringify({

        nome: document.getElementById("nome").value,
        filiacao: document.getElementById("filiacao").value,

        nascimento: document.getElementById("nascimento").value,
        sexo: document.getElementById("sexo").value,
        estado_civil: document.getElementById("estado_civil").value,
        naturalidade: document.getElementById("naturalidade").value,

        cor: document.getElementById("cor").value,

        telefone1: document.getElementById("telefone1").value,
        telefone2: document.getElementById("telefone2").value,

        cep: document.getElementById("cep").value,
        rua: document.getElementById("rua").value,
        numero: document.getElementById("numero").value,
        complemento: document.getElementById("complemento").value,

        bairro: document.getElementById("bairro").value,
        cidade: document.getElementById("cidade").value,
        estado: document.getElementById("estado").value,

        referencia: document.getElementById("referencia").value,
        motivo: document.getElementById("motivo").value,

        rg: document.getElementById("rg").value,
        cpf: document.getElementById("cpf").value,
        titulo_eleitor: document.getElementById("titulo_eleitor").value,

        zona: document.getElementById("zona").value,
        secao: document.getElementById("secao").value,

        carteira_trabalho: document.getElementById("carteira_trabalho").value,

        certidao: document.getElementById("certidao").value,

        programa_federal: document.getElementById("programa_federal").value,
        assistencia: document.getElementById("assistencia").value,

        situacao_profissional: document.getElementById("situacao_profissional").value,
        tempo_desempregado: document.getElementById("tempo_desempregado").value,

        composicao_familiar: [],
        renda_familiar: "",

        situacao_habitacional: document.getElementById("situacao_habitacional").value,
        tempo_moradia: document.getElementById("tempo_moradia").value,
        comodos: document.getElementById("comodos").value,

        tipo_construcao: document.getElementById("tipo_construcao").value,

        abastecimento_agua: document.getElementById("abastecimento_agua").value,

        iluminacao: document.getElementById("iluminacao").value,

        medicamentos: document.getElementById("medicamentos").value,
        gas: document.getElementById("gas").value,
        alimentacao: document.getElementById("alimentacao").value,
        contas: document.getElementById("contas").value,
        outras_despesas: document.getElementById("outras_despesas").value,
        total_despesas: document.getElementById("total_despesas").value,

        saude_familia: [],

        fumante: "",
        fumante_quem: "",

        alcoolista: "",
        alcoolista_quem: "",

        drogas: "",
        drogas_quem: "",

        observacoes: document.getElementById("observacoes").value

      })

    }
  );

  const texto = await resposta.text();

  alert(texto);

}

</script>

</body>

</html>
