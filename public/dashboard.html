<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<title>Dashboard ONG</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="sidebar">

<div class="logo">

<img src="images/logo.png">

</div>

<a href="dashboard.html">Dashboard</a>

<a href="cadastro.html">Cadastrar Atendido</a>

<a href="lista.html">Lista de Atendidos</a>

<a href="index.html">Sair</a>

</div>

<div class="content">

<h1>Dashboard</h1>

<div class="row">

<div class="col-md-4">

<div class="card-dashboard">

<h3>Total de Atendidos</h3>

<h1 id="total">0</h1>

</div>

</div>

<div class="col-md-4">

<div class="card-dashboard">

<h3>Sistema ONG</h3>

<p>
Sistema administrativo online
</p>

</div>

</div>

<div class="col-md-4">

<div class="card-dashboard">

<h3>Status</h3>

<p>
Sistema funcionando normalmente
</p>

</div>

</div>

</div>

</div>

<script>

async function carregarTotal(){

  const resposta = await fetch(
    "https://sistema-ong.onrender.com/atendidos"
  );

  const dados = await resposta.json();

  document.getElementById("total").innerHTML = dados.length;

}

carregarTotal();

</script>
