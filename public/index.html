<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <title>Sistema ONG</title>
</head>

<body>

  <h1>Cadastro ONG</h1>

  <input id="nome" placeholder="Nome"><br><br>

  <input id="sobrenome" placeholder="Sobrenome"><br><br>

  <input id="telefone" placeholder="Telefone"><br><br>

  <input id="cep" placeholder="CEP"><br><br>

  <input id="rua" placeholder="Rua"><br><br>

  <input id="bairro" placeholder="Bairro"><br><br>

  <input id="cidade" placeholder="Cidade"><br><br>

  <input id="estado" placeholder="Estado"><br><br>

  <button onclick="cadastrar()">Cadastrar</button>

  <script>

    async function cadastrar() {

      const resposta = await fetch("/atendidos", {

        method: "POST",

        headers: {
          "Content-Type": "application/json"
        },

        body: JSON.stringify({

          nome: document.getElementById("nome").value,
          sobrenome: document.getElementById("sobrenome").value,
          telefone: document.getElementById("telefone").value,
          cep: document.getElementById("cep").value,
          rua: document.getElementById("rua").value,
          bairro: document.getElementById("bairro").value,
          cidade: document.getElementById("cidade").value,
          estado: document.getElementById("estado").value

        })

      });

      const texto = await resposta.text();

      alert(texto);

    }

  </script>

</body>

</html>
