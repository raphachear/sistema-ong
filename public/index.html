<!DOCTYPE html>
<html lang="pt-br">

<head>

  <meta charset="UTF-8">

  <title>Login ONG</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

  <div class="row justify-content-center">

    <div class="col-md-5">

      <div class="container-box">

        <h1>Sistema ONG</h1>

        <input type="email" id="email" class="form-control mb-3" placeholder="Email">

        <input type="password" id="senha" class="form-control mb-3" placeholder="Senha">

        <button class="btn btn-primary w-100 mb-2" onclick="login()">
          Entrar
        </button>

        <button class="btn btn-success w-100 mb-2"
          onclick="window.location.href='registro.html'">

          Criar Conta

        </button>

        <button class="btn btn-secondary w-100"
          onclick="window.location.href='recuperar.html'">

          Esqueci minha senha

        </button>

      </div>

    </div>

  </div>

</div>

<script>

function login(){

  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  if(email === "admin@ong.com" && senha === "123456"){

    window.location.href = "dashboard.html";

  } else {

    alert("Email ou senha inválidos");

  }

}

</script>

</body>

</html>
