<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<title>Lista de Atendidos</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet"
>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<div class="sidebar">

<div class="logo">
<img src="images/logo.png">
</div>

<a href="dashboard.html">Dashboard</a>
<a href="cadastro.html">Cadastro Social</a>
<a href="lista.html">Lista de Atendidos</a>

</div>

<div class="content">

<div class="container-box">

<h1>Lista de Atendidos</h1>

<input
id="busca"
class="form-control mb-4"
placeholder="Buscar por nome, CPF ou cidade"
onkeyup="listar()"
>

<table class="table table-bordered table-hover">

<thead class="table-dark">

<tr>

<th>Nome</th>
<th>CPF</th>
<th>Cidade</th>
<th>Ações</th>

</tr>

</thead>

<tbody id="tabela"></tbody>

</table>

</div>

</div>

<!-- MODAL -->

<div class="modal fade" id="modalFicha" tabindex="-1">

<div class="modal-dialog modal-xl">

<div class="modal-content">

<div class="modal-header">

<h5 class="modal-title">
Ficha Social Completa
</h5>

<button
type="button"
class="btn-close"
data-bs-dismiss="modal"
></button>

</div>

<div class="modal-body" id="conteudoFicha">

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

const API =
"https://sistema-ong.onrender.com";

let atendidos = [];

async function listar(){

  const resposta = await fetch(
    API + "/atendidos"
  );

  atendidos = await resposta.json();

  const busca = document
    .getElementById("busca")
    .value
    .toLowerCase();

  let html = "";

  atendidos.forEach((item) => {

    const texto = `
      ${item.nome}
      ${item.cpf}
      ${item.cidade}
    `.toLowerCase();

    if(texto.includes(busca)){

      html += `

      <tr>

        <td>${item.nome}</td>
        <td>${item.cpf}</td>
        <td>${item.cidade}</td>

        <td>

          <button
            class="btn btn-info btn-sm"
            onclick="visualizar(${item.id})"
          >
            Visualizar
          </button>

          <button
            class="btn btn-warning btn-sm"
            onclick="editar(${item.id})"
          >
            Editar
          </button>

          <button
            class="btn btn-danger btn-sm"
            onclick="excluirCadastro(${item.id})"
          >
            Excluir
          </button>

          <button
            class="btn btn-primary btn-sm"
            onclick="gerarPDF(${item.id})"
          >
            PDF
          </button>

        </td>

      </tr>

      `;

    }

  });

  document.getElementById("tabela").innerHTML = html;

}

function editar(id){

  window.location.href =
    "cadastro.html?id=" + id;

}

async function excluirCadastro(id){

  const confirmar = confirm(
    "Deseja excluir este cadastro?"
  );

  if(!confirmar) return;

  await fetch(

    API + "/atendidos/" + id,

    {

      method: "DELETE"

    }

  );

  alert("Cadastro excluído!");

  listar();

}

function visualizar(id){

  const item = atendidos.find(a => a.id == id);

  document.getElementById("conteudoFicha").innerHTML = `

    <h3>${item.nome}</h3>

    <hr>

    <h4>Dados Pessoais</h4>

    <p><b>CPF:</b> ${item.cpf || ""}</p>
    <p><b>RG:</b> ${item.rg || ""}</p>
    <p><b>Nascimento:</b> ${item.nascimento || ""}</p>
    <p><b>Sexo:</b> ${item.sexo || ""}</p>
    <p><b>Estado Civil:</b> ${item.estado_civil || ""}</p>

    <hr>

    <h4>Contato</h4>

    <p><b>Telefone 1:</b> ${item.telefone1 || ""}</p>
    <p><b>Telefone 2:</b> ${item.telefone2 || ""}</p>

    <hr>

    <h4>Endereço</h4>

    <p>
    ${item.rua || ""}, ${item.numero || ""}
    </p>

    <p>
    ${item.bairro || ""}
    </p>

    <p>
    ${item.cidade || ""} - ${item.estado || ""}
    </p>

    <p><b>CEP:</b> ${item.cep || ""}</p>

    <hr>

    <h4>Informações Sociais</h4>

    <p>
    <b>Situação Profissional:</b>
    ${item.situacao_profissional || ""}
    </p>

    <p>
    <b>Renda Familiar:</b>
    ${item.renda_familiar || ""}
    </p>

    <p>
    <b>Motivo Atendimento:</b>
    ${item.motivo || ""}
    </p>

    <p>
    <b>Observações:</b>
    ${item.observacoes || ""}
    </p>

  `;

  const modal = new bootstrap.Modal(
    document.getElementById("modalFicha")
  );

  modal.show();

}

async function gerarPDF(id){

  const item = atendidos.find(a => a.id == id);

  const { jsPDF } = window.jspdf;

  const doc = new jsPDF();

  let y = 15;

  function titulo(texto){

    doc.setFontSize(15);
    doc.setFont(undefined, "bold");

    doc.text(texto, 15, y);

    y += 8;

    doc.setDrawColor(0);

    doc.line(15, y, 195, y);

    y += 8;

  }

  function linha(label, valor){

    doc.setFontSize(11);

    doc.setFont(undefined, "bold");

    doc.text(label, 15, y);

    doc.setFont(undefined, "normal");

    doc.text(String(valor || ""), 70, y);

    y += 7;

  }

  // CABEÇALHO

  doc.setFontSize(18);

  doc.setFont(undefined, "bold");

  doc.text("FICHA SOCIAL - ONG", 60, y);

  y += 15;

  // DADOS PESSOAIS

  titulo("DADOS PESSOAIS");

  linha("Nome:", item.nome);
  linha("Filiação:", item.filiacao);
  linha("Nascimento:", item.nascimento);
  linha("Sexo:", item.sexo);
  linha("Estado Civil:", item.estado_civil);
  linha("Naturalidade:", item.naturalidade);
  linha("Cor/Raça:", item.cor);

  // DOCUMENTOS

  titulo("DOCUMENTAÇÃO");

  linha("CPF:", item.cpf);
  linha("RG:", item.rg);
  linha("Título Eleitor:", item.titulo_eleitor);
  linha("Zona:", item.zona);
  linha("Seção:", item.secao);
  linha("Carteira Trabalho:", item.carteira_trabalho);

  // CONTATO

  titulo("CONTATO");

  linha("Telefone 1:", item.telefone1);
  linha("Telefone 2:", item.telefone2);

  // ENDEREÇO

  titulo("ENDEREÇO");

  linha("CEP:", item.cep);
  linha("Rua:", item.rua);
  linha("Número:", item.numero);
  linha("Complemento:", item.complemento);
  linha("Bairro:", item.bairro);
  linha("Cidade:", item.cidade);
  linha("Estado:", item.estado);
  linha("Referência:", item.referencia);

  // SITUAÇÃO SOCIAL

  titulo("SITUAÇÃO SOCIAL");

  linha(
    "Situação Profissional:",
    item.situacao_profissional
  );

  linha(
    "Tempo Desempregado:",
    item.tempo_desempregado
  );

  linha(
    "Renda Familiar:",
    item.renda_familiar
  );

  // HABITAÇÃO

  titulo("HABITAÇÃO");

  linha(
    "Situação Habitacional:",
    item.situacao_habitacional
  );

  linha(
    "Tempo Moradia:",
    item.tempo_moradia
  );

  linha(
    "Cômodos:",
    item.comodos
  );

  linha(
    "Tipo Construção:",
    item.tipo_construcao
  );

  linha(
    "Abastecimento Água:",
    item.abastecimento_agua
  );

  // DESPESAS

  titulo("DESPESAS");

  linha("Medicamentos:", item.medicamentos);
  linha("Gás:", item.gas);
  linha("Alimentação:", item.alimentacao);
  linha("Contas:", item.contas);
  linha(
    "Outras Despesas:",
    item.outras_despesas
  );

  // MOTIVO

  titulo("MOTIVO DO ATENDIMENTO");

  doc.setFontSize(11);

  doc.setFont(undefined, "normal");

  const motivo = doc.splitTextToSize(

    item.motivo || "",

    170

  );

  doc.text(motivo, 15, y);

  y += motivo.length * 7 + 10;

  // OBSERVAÇÕES

  titulo("OBSERVAÇÕES");

  const obs = doc.splitTextToSize(

    item.observacoes || "",

    170

  );

  doc.text(obs, 15, y);

  y += obs.length * 7 + 20;

  // ASSINATURAS

  doc.line(20, y, 80, y);
  doc.line(120, y, 180, y);

  y += 6;

  doc.text("Responsável ONG", 28, y);
  doc.text("Atendido", 140, y);

  doc.save(

    "ficha-social-" +
    item.nome +
    ".pdf"

  );

}
listar();

</script>

</body>

</html>
