<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<title>Cadastro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container mt-5">

<div class="container-box">

<h1>Cadastro de Atendidos</h1>

<div class="row">

<div class="col-md-6">
<input id="nome" class="form-control mb-3" placeholder="Nome">
</div>

<div class="col-md-6">
<input id="sobrenome" class="form-control mb-3" placeholder="Sobrenome">
</div>

<div class="col-md-6">
<input id="cpf" class="form-control mb-3" placeholder="CPF">
</div>

<div class="col-md-6">
<input id="telefone" class="form-control mb-3" placeholder="Telefone">
</div>

<div class="col-md-4">
<input id="cep" class="form-control mb-3" placeholder="CEP" onblur="buscarCEP()">
</div>

<div class="col-md-8">
<input id="rua" class="form-control mb-3" placeholder="Rua">
</div>

<div class="col-md-4">
<input id="numero" class="form-control mb-3" placeholder="Número">
</div>

<div class="col-md-8">
<input id="complemento" class="form-control mb-3" placeholder="Complemento">
</div>

<div class="col-md-4">
<input id="bairro" class="form-control mb-3" placeholder="Bairro">
</div>

<div class="col-md-4">
<input id="cidade" class="form-control mb-3" placeholder="Cidade">
</div>

<div class="col-md-4">
<input id="estado" class="form-control mb-3" placeholder="Estado">
</div>

</div>

<button class="btn btn-success w-100" onclick="cadastrar()">
Cadastrar
</button>

<button class="btn btn-secondary w-100 mt-2"
onclick="window.location.href='dashboard.html'">

Voltar

</button>

</div>

</div>

<script>

async function buscarCEP(){

  const cep = document.getElementById("cep").value;

  const resposta = await fetch(
    `https://viacep.com.br/ws/${cep}/json/`
  );

  const dados = await resposta.json();

  document.getElementById("rua").value = dados.logradouro;
  document.getElementById("bairro").value = dados.bairro;
  document.getElementById("cidade").value = dados.localidade;
  document.getElementById("estado").value = dados.uf;

}

async function cadastrar(){

  const resposta = await fetch(
    "https://sistema-ong.onrender.com/atendidos",
    {

      method: "POST",

      headers: {
        "Content-Type": "application/json"
      },

      body: JSON.stringify({

        nome: document.getElementById("nome").value,
        sobrenome: document.getElementById("sobrenome").value,
        cpf: document.getElementById("cpf").value,
        telefone: document.getElementById("telefone").value,

        cep: document.getElementById("cep").value,
        rua: document.getElementById("rua").value,
        numero: document.getElementById("numero").value,
        complemento: document.getElementById("complemento").value,

        bairro: document.getElementById("bairro").value,
        cidade: document.getElementById("cidade").value,
        estado: document.getElementById("estado").value

      })

    }
  );

  const texto = await resposta.text();

  alert(texto);

}

</script>

</body>

</html>
