<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<title>Lista de Atendidos</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet"
>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

.section-title{

  background:#0d6efd;
  color:white;

  padding:10px;

  border-radius:8px;

  margin-top:25px;
  margin-bottom:20px;

  font-size:20px;
  font-weight:bold;

}

.info-box{

  background:#f8f9fa;

  border-radius:10px;

  padding:15px;

  margin-bottom:15px;

  border:1px solid #dee2e6;

}

.info-label{

  font-weight:bold;

}

.modal-body{

  max-height:80vh;

  overflow:auto;

}

</style>

</head>

<body>

<div class="sidebar">

<div class="logo">
<img src="images/logo.png">
</div>

<a href="dashboard.html">Dashboard</a>
<a href="cadastro.html">Cadastro Social</a>
<a href="lista.html">Lista de Atendidos</a>

</div>

<div class="content">

<div class="container-box">

<h1 class="mb-4">
Lista de Atendidos
</h1>

<input
id="busca"
class="form-control mb-4"
placeholder="Buscar por nome, CPF ou cidade"
onkeyup="listar()"
>

<table class="table table-hover table-bordered">

<thead class="table-dark">

<tr>

<th>Nome</th>
<th>CPF</th>
<th>Cidade</th>
<th width="350">Ações</th>

</tr>

</thead>

<tbody id="tabela"></tbody>

</table>

</div>

</div>

<!-- MODAL -->

<div
class="modal fade"
id="modalFicha"
tabindex="-1"
>

<div class="modal-dialog modal-xl">

<div class="modal-content">

<div class="modal-header">

<h4 class="modal-title">
Ficha Social Completa
</h4>

<button
type="button"
class="btn-close"
data-bs-dismiss="modal"
></button>

</div>

<div class="modal-body" id="conteudoFicha">

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

const API =
"https://sistema-ong.onrender.com";

let atendidos = [];

async function listar(){

  const resposta = await fetch(
    API + "/atendidos"
  );

  atendidos = await resposta.json();

  const busca = document
    .getElementById("busca")
    .value
    .toLowerCase();

  let html = "";

  atendidos.forEach((item) => {

    const texto = `
      ${item.nome}
      ${item.cpf}
      ${item.cidade}
    `.toLowerCase();

    if(texto.includes(busca)){

      html += `

      <tr>

        <td>${item.nome || ""}</td>
        <td>${item.cpf || ""}</td>
        <td>${item.cidade || ""}</td>

        <td>

          <button
            class="btn btn-info btn-sm"
            onclick="visualizar(${item.id})"
          >
            Visualizar
          </button>

          <button
            class="btn btn-warning btn-sm"
            onclick="editar(${item.id})"
          >
            Editar
          </button>

          <button
            class="btn btn-danger btn-sm"
            onclick="excluirCadastro(${item.id})"
          >
            Excluir
          </button>

          <button
            class="btn btn-success btn-sm"
            onclick="gerarPDF(${item.id})"
          >
            PDF
          </button>

        </td>

      </tr>

      `;

    }

  });

  document.getElementById("tabela").innerHTML = html;

}

function editar(id){

  window.location.href =
    "cadastro.html?id=" + id;

}

async function excluirCadastro(id){

  const confirmar = confirm(
    "Deseja excluir este cadastro?"
  );

  if(!confirmar) return;

  await fetch(

    API + "/atendidos/" + id,

    {

      method:"DELETE"

    }

  );

  alert("Cadastro excluído!");

  listar();

}

function secao(titulo){

  return `
    <div class="section-title">
      ${titulo}
    </div>
  `;

}

function campo(label, valor){

  return `

    <div class="col-md-6">

      <div class="info-box">

        <div class="info-label">
          ${label}
        </div>

        <div>
          ${valor || ""}
        </div>

      </div>

    </div>

  `;

}

function visualizar(id){

  const item =
    atendidos.find(a => a.id == id);

  document.getElementById(
    "conteudoFicha"
  ).innerHTML = `

  <div class="container-fluid">

    ${secao("Dados Pessoais")}

    <div class="row">

      ${campo("Nome", item.nome)}
      ${campo("Filiação", item.filiacao)}
      ${campo("Nascimento", item.nascimento)}
      ${campo("Sexo", item.sexo)}
      ${campo("Estado Civil", item.estado_civil)}
      ${campo("Naturalidade", item.naturalidade)}
      ${campo("Cor/Raça", item.cor)}

    </div>

    ${secao("Contato")}

    <div class="row">

      ${campo("Telefone 1", item.telefone1)}
      ${campo("Telefone 2", item.telefone2)}

    </div>

    ${secao("Endereço")}

    <div class="row">

      ${campo("CEP", item.cep)}
      ${campo("Rua", item.rua)}
      ${campo("Número", item.numero)}
      ${campo("Complemento", item.complemento)}
      ${campo("Bairro", item.bairro)}
      ${campo("Cidade", item.cidade)}
      ${campo("Estado", item.estado)}

    </div>

    ${secao("Documentação")}

    <div class="row">

      ${campo("CPF", item.cpf)}
      ${campo("RG", item.rg)}
      ${campo("Título Eleitor", item.titulo_eleitor)}
      ${campo("Zona", item.zona)}
      ${campo("Seção", item.secao)}
      ${campo("Carteira Trabalho", item.carteira_trabalho)}

    </div>

    ${secao("Situação Social")}

    <div class="row">

      ${campo("Situação Profissional", item.situacao_profissional)}
      ${campo("Tempo Desempregado", item.tempo_desempregado)}
      ${campo("Renda Familiar", item.renda_familiar)}

    </div>

    ${secao("Habitação")}

    <div class="row">

      ${campo("Situação Habitacional", item.situacao_habitacional)}
      ${campo("Tempo Moradia", item.tempo_moradia)}
      ${campo("Cômodos", item.comodos)}
      ${campo("Tipo Construção", item.tipo_construcao)}
      ${campo("Abastecimento Água", item.abastecimento_agua)}

    </div>

    ${secao("Despesas")}

    <div class="row">

      ${campo("Medicamentos", item.medicamentos)}
      ${campo("Gás", item.gas)}
      ${campo("Alimentação", item.alimentacao)}
      ${campo("Contas", item.contas)}
      ${campo("Outras Despesas", item.outras_despesas)}

    </div>

    ${secao("Atendimento Social")}

    <div class="row">

      ${campo("Motivo Atendimento", item.motivo)}
      ${campo("Observações", item.observacoes)}

    </div>

  </div>

  `;

  const modal = new bootstrap.Modal(

    document.getElementById(
      "modalFicha"
    )

  );

  modal.show();

}

async function gerarPDF(id){

  const item =
    atendidos.find(a => a.id == id);

  const { jsPDF } = window.jspdf;

  const doc = new jsPDF();

  let y = 20;

  function titulo(texto){

    doc.setFontSize(15);

    doc.setFont(undefined, "bold");

    doc.text(texto, 15, y);

    y += 6;

    doc.line(15, y, 195, y);

    y += 8;

  }

  function linha(label, valor){

    doc.setFont(undefined, "bold");

    doc.text(label, 15, y);

    doc.setFont(undefined, "normal");

    const quebrado =
      doc.splitTextToSize(

        String(valor || ""),

        120

      );

    doc.text(quebrado, 70, y);

    y += quebrado.length * 7;

  }

  doc.setFontSize(18);

  doc.text(
    "FICHA SOCIAL - ONG",
    55,
    y
  );

  y += 15;

  titulo("Dados Pessoais");

  linha("Nome:", item.nome);
  linha("Filiação:", item.filiacao);
  linha("Nascimento:", item.nascimento);
  linha("Sexo:", item.sexo);
  linha("Estado Civil:", item.estado_civil);

  titulo("Contato");

  linha("Telefone 1:", item.telefone1);
  linha("Telefone 2:", item.telefone2);

  titulo("Endereço");

  linha("CEP:", item.cep);
  linha("Rua:", item.rua);
  linha("Número:", item.numero);
  linha("Bairro:", item.bairro);
  linha("Cidade:", item.cidade);

  titulo("Documentação");

  linha("CPF:", item.cpf);
  linha("RG:", item.rg);

  titulo("Situação Social");

  linha(
    "Situação Profissional:",
    item.situacao_profissional
  );

  linha(
    "Renda Familiar:",
    item.renda_familiar
  );

  titulo("Atendimento");

  linha("Motivo:", item.motivo);

  y += 20;

  doc.line(20, y, 80, y);
  doc.line(120, y, 180, y);

  y += 8;

  doc.text(
    "Responsável ONG",
    25,
    y
  );

  doc.text(
    "Assinatura Atendido",
    120,
    y
  );

  doc.save(

    "ficha-social.pdf"

  );

}

listar();

</script>

</body>

</html>
