<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<title>Cadastro Social</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet"
>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="sidebar">

<div class="logo">
<img src="images/logo.png">
</div>

<a href="dashboard.html">Dashboard</a>
<a href="cadastro.html">Cadastro Social</a>
<a href="lista.html">Lista de Atendidos</a>

</div>

<div class="content">

<div class="container-box">

<h1 class="mb-4">
Cadastro Social
</h1>

<div class="row">

<!-- DADOS PESSOAIS -->

<div class="col-12">

<div class="card shadow-sm mb-4">

<div class="card-header bg-dark text-white">
<h4>Dados Pessoais</h4>
</div>

<div class="card-body">

<div class="row">

<div class="col-md-6 mb-3">
<label>Nome</label>
<input id="nome" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Filiação</label>
<input id="filiacao" class="form-control">
</div>

<div class="col-md-4 mb-3">
<label>Nascimento</label>
<input id="nascimento" type="date" class="form-control">
</div>

<div class="col-md-4 mb-3">

<label>Sexo</label>

<select id="sexo" class="form-control">

<option></option>
<option>Masculino</option>
<option>Feminino</option>

</select>

</div>

<div class="col-md-4 mb-3">
<label>Estado Civil</label>
<input id="estado_civil" class="form-control">
</div>

<div class="col-md-4 mb-3">
<label>Naturalidade</label>
<input id="naturalidade" class="form-control">
</div>

<div class="col-md-4 mb-3">
<label>Cor/Raça</label>
<input id="cor" class="form-control">
</div>

</div>

</div>
</div>
</div>

<!-- CONTATO -->

<div class="col-12">

<div class="card shadow-sm mb-4">

<div class="card-header bg-primary text-white">
<h4>Contato</h4>
</div>

<div class="card-body">

<div class="row">

<div class="col-md-6 mb-3">
<label>Telefone 1</label>
<input id="telefone1" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Telefone 2</label>
<input id="telefone2" class="form-control">
</div>

</div>

</div>
</div>
</div>

<!-- ENDEREÇO -->

<div class="col-12">

<div class="card shadow-sm mb-4">

<div class="card-header bg-success text-white">
<h4>Endereço</h4>
</div>

<div class="card-body">

<div class="row">

<div class="col-md-3 mb-3">

<label>CEP</label>

<input
id="cep"
class="form-control"
onblur="buscarCEP()"
>

</div>

<div class="col-md-6 mb-3">
<label>Rua</label>
<input id="rua" class="form-control">
</div>

<div class="col-md-3 mb-3">
<label>Número</label>
<input id="numero" class="form-control">
</div>

<div class="col-md-4 mb-3">
<label>Bairro</label>
<input id="bairro" class="form-control">
</div>

<div class="col-md-4 mb-3">
<label>Cidade</label>
<input id="cidade" class="form-control">
</div>

<div class="col-md-4 mb-3">
<label>Estado</label>
<input id="estado" class="form-control">
</div>

<div class="col-md-12 mb-3">
<label>Complemento</label>
<input id="complemento" class="form-control">
</div>

<div class="col-md-12 mb-3">
<label>Referência</label>
<input id="referencia" class="form-control">
</div>

</div>

</div>
</div>
</div>

<!-- DOCUMENTAÇÃO -->

<div class="col-12">

<div class="card shadow-sm mb-4">

<div class="card-header bg-danger text-white">
<h4>Documentação</h4>
</div>

<div class="card-body">

<div class="row">

<div class="col-md-4 mb-3">
<label>RG</label>
<input id="rg" class="form-control">
</div>

<div class="col-md-4 mb-3">
<label>CPF</label>
<input id="cpf" class="form-control">
</div>

<div class="col-md-4 mb-3">
<label>Título Eleitor</label>
<input id="titulo_eleitor" class="form-control">
</div>

<div class="col-md-3 mb-3">
<label>Zona</label>
<input id="zona" class="form-control">
</div>

<div class="col-md-3 mb-3">
<label>Seção</label>
<input id="secao" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Carteira Trabalho</label>
<input id="carteira_trabalho" class="form-control">
</div>

</div>

</div>
</div>
</div>

<!-- SITUAÇÃO SOCIAL -->

<div class="col-12">

<div class="card shadow-sm mb-4">

<div class="card-header bg-secondary text-white">
<h4>Situação Social</h4>
</div>

<div class="card-body">

<div class="row">

<div class="col-md-6 mb-3">
<label>Situação Profissional</label>
<input id="situacao_profissional" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Tempo Desempregado</label>
<input id="tempo_desempregado" class="form-control">
</div>

<div class="col-md-4 mb-3">
<label>Renda Familiar</label>
<input id="renda_familiar" class="form-control">
</div>

</div>

</div>
</div>
</div>

<!-- HABITAÇÃO -->

<div class="col-12">

<div class="card shadow-sm mb-4">

<div class="card-header bg-warning">
<h4>Habitação</h4>
</div>

<div class="card-body">

<div class="row">

<div class="col-md-4 mb-3">
<label>Situação Habitacional</label>
<input id="situacao_habitacional" class="form-control">
</div>

<div class="col-md-4 mb-3">
<label>Tempo Moradia</label>
<input id="tempo_moradia" class="form-control">
</div>

<div class="col-md-4 mb-3">
<label>Cômodos</label>
<input id="comodos" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Tipo Construção</label>
<input id="tipo_construcao" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Abastecimento Água</label>
<input id="abastecimento_agua" class="form-control">
</div>

</div>

</div>
</div>
</div>

<!-- DESPESAS -->

<div class="col-12">

<div class="card shadow-sm mb-4">

<div class="card-header bg-info text-white">
<h4>Despesas</h4>
</div>

<div class="card-body">

<div class="row">

<div class="col-md-3 mb-3">
<label>Medicamentos</label>
<input id="medicamentos" class="form-control">
</div>

<div class="col-md-3 mb-3">
<label>Gás</label>
<input id="gas" class="form-control">
</div>

<div class="col-md-3 mb-3">
<label>Alimentação</label>
<input id="alimentacao" class="form-control">
</div>

<div class="col-md-3 mb-3">
<label>Contas</label>
<input id="contas" class="form-control">
</div>

<div class="col-md-12 mb-3">

<label>Outras Despesas</label>

<textarea
id="outras_despesas"
class="form-control"
></textarea>

</div>

</div>

</div>
</div>
</div>

<!-- ATENDIMENTO -->

<div class="col-12">

<div class="card shadow-sm mb-4">

<div class="card-header bg-dark text-white">
<h4>Atendimento Social</h4>
</div>

<div class="card-body">

<div class="row">

<div class="col-md-12 mb-3">

<label>Motivo Atendimento</label>

<textarea
id="motivo"
class="form-control"
></textarea>

</div>

<div class="col-md-12 mb-3">

<label>Observações</label>

<textarea
id="observacoes"
class="form-control"
></textarea>

</div>

<div class="col-md-12 mt-4">

<button
class="btn btn-success btn-lg"
onclick="salvar()"
>
Salvar Cadastro
</button>

</div>

</div>

</div>
</div>
</div>

</div>

</div>

</div>

<script>

const API =
"https://sistema-ong.onrender.com";

const params =
new URLSearchParams(
window.location.search
);

const idEdicao =
params.get("id");

async function carregarDados(){

if(!idEdicao) return;

const resposta = await fetch(

API + "/atendidos/" + idEdicao

);

const item = await resposta.json();

for(const campo in item){

const elemento =
document.getElementById(campo);

if(elemento){

elemento.value = item[campo];

}

}

}

carregarDados();

async function buscarCEP(){

const cep =
document.getElementById("cep").value;

if(!cep) return;

const resposta = await fetch(

"https://viacep.com.br/ws/" +
cep +
"/json/"

);

const dados =
await resposta.json();

document.getElementById("rua").value =
dados.logradouro || "";

document.getElementById("bairro").value =
dados.bairro || "";

document.getElementById("cidade").value =
dados.localidade || "";

document.getElementById("estado").value =
dados.uf || "";

}

async function salvar(){

const dados = {

nome:
document.getElementById("nome").value,

filiacao:
document.getElementById("filiacao").value,

nascimento:
document.getElementById("nascimento").value,

sexo:
document.getElementById("sexo").value,

estado_civil:
document.getElementById("estado_civil").value,

naturalidade:
document.getElementById("naturalidade").value,

cor:
document.getElementById("cor").value,

telefone1:
document.getElementById("telefone1").value,

telefone2:
document.getElementById("telefone2").value,

cep:
document.getElementById("cep").value,

rua:
document.getElementById("rua").value,

numero:
document.getElementById("numero").value,

bairro:
document.getElementById("bairro").value,

cidade:
document.getElementById("cidade").value,

estado:
document.getElementById("estado").value,

complemento:
document.getElementById("complemento").value,

referencia:
document.getElementById("referencia").value,

rg:
document.getElementById("rg").value,

cpf:
document.getElementById("cpf").value,

titulo_eleitor:
document.getElementById("titulo_eleitor").value,

zona:
document.getElementById("zona").value,

secao:
document.getElementById("secao").value,

carteira_trabalho:
document.getElementById("carteira_trabalho").value,

situacao_profissional:
document.getElementById("situacao_profissional").value,

tempo_desempregado:
document.getElementById("tempo_desempregado").value,

renda_familiar:
document.getElementById("renda_familiar").value,

situacao_habitacional:
document.getElementById("situacao_habitacional").value,

tempo_moradia:
document.getElementById("tempo_moradia").value,

comodos:
document.getElementById("comodos").value,

tipo_construcao:
document.getElementById("tipo_construcao").value,

abastecimento_agua:
document.getElementById("abastecimento_agua").value,

medicamentos:
document.getElementById("medicamentos").value,

gas:
document.getElementById("gas").value,

alimentacao:
document.getElementById("alimentacao").value,

contas:
document.getElementById("contas").value,

outras_despesas:
document.getElementById("outras_despesas").value,

motivo:
document.getElementById("motivo").value,

observacoes:
document.getElementById("observacoes").value

};

const resposta = await fetch(

API + "/atendidos" + (idEdicao ? "/" + idEdicao : ""),

{

method:
idEdicao ? "PUT" : "POST",

headers: {

"Content-Type":
"application/json"

},

body:
JSON.stringify(dados)

}

);

const msg =
await resposta.text();

alert(msg);

window.location.href =
"lista.html";

}

</script>

</body>

</html>
