<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<title>Lista de Atendidos</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<div class="sidebar">

<div class="logo">
<img src="images/logo.png">
</div>

<a href="dashboard.html">Dashboard</a>
<a href="cadastro.html">Cadastro Social</a>
<a href="lista.html">Lista de Atendidos</a>

</div>

<div class="content">

<div class="container-box">

<h1>Lista de Atendidos</h1>

<input
id="busca"
class="form-control mb-4"
placeholder="Buscar por nome, CPF ou cidade"
onkeyup="listar()"
>

<table class="table table-bordered table-hover">

<thead class="table-dark">

<tr>

<th>Nome</th>
<th>CPF</th>
<th>Cidade</th>
<th>Ações</th>

</tr>

</thead>

<tbody id="tabela">

</tbody>

</table>

</div>

</div>

<!-- MODAL -->

<div class="modal fade" id="modalFicha" tabindex="-1">

<div class="modal-dialog modal-xl">

<div class="modal-content">

<div class="modal-header">

<h5 class="modal-title">
Ficha Social Completa
</h5>

<button
type="button"
class="btn-close"
data-bs-dismiss="modal"
></button>

</div>

<div class="modal-body" id="conteudoFicha">

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

let atendidos = [];

async function listar(){

  const resposta = await fetch(
    "https://sistema-ong.onrender.com/atendidos"
  );

  atendidos = await resposta.json();

  const busca = document
    .getElementById("busca")
    .value
    .toLowerCase();

  let html = "";

  atendidos.forEach((item) => {

    const textoBusca = `
      ${item.nome}
      ${item.cpf}
      ${item.cidade}
    `.toLowerCase();

    if(textoBusca.includes(busca)){

      html += `

      <tr>

        <td>${item.nome}</td>
        <td>${item.cpf}</td>
        <td>${item.cidade}</td>

        <td>

          <button
            class="btn btn-info btn-sm"
            onclick="visualizar(${item.id})"
          >
            Visualizar
          </button>

          <button
            class="btn btn-primary btn-sm"
            onclick="gerarPDF(${item.id})"
          >
            PDF
          </button>

        </td>

      </tr>

      `;

    }

  });

  document.getElementById("tabela").innerHTML = html;

}

function visualizar(id){

  const item = atendidos.find(a => a.id == id);

  document.getElementById("conteudoFicha").innerHTML = `

    <h2>${item.nome}</h2>

    <hr>

    <h4>Identificação</h4>

    <div class="row">

      <div class="col-md-6 mt-2">
        <b>Filiação:</b> ${item.filiacao || ""}
      </div>

      <div class="col-md-3 mt-2">
        <b>Nascimento:</b> ${item.nascimento || ""}
      </div>

      <div class="col-md-3 mt-2">
        <b>Sexo:</b> ${item.sexo || ""}
      </div>

      <div class="col-md-4 mt-2">
        <b>Estado Civil:</b> ${item.estado_civil || ""}
      </div>

      <div class="col-md-4 mt-2">
        <b>Naturalidade:</b> ${item.naturalidade || ""}
      </div>

      <div class="col-md-4 mt-2">
        <b>Cor/Raça:</b> ${item.cor || ""}
      </div>

      <div class="col-md-6 mt-2">
        <b>Telefone 1:</b> ${item.telefone1 || ""}
      </div>

      <div class="col-md-6 mt-2">
        <b>Telefone 2:</b> ${item.telefone2 || ""}
      </div>

    </div>

    <hr>

    <h4>Endereço</h4>

    <div class="row">

      <div class="col-md-6 mt-2">
        <b>Rua:</b> ${item.rua || ""}
      </div>

      <div class="col-md-2 mt-2">
        <b>Número:</b> ${item.numero || ""}
      </div>

      <div class="col-md-4 mt-2">
        <b>Complemento:</b> ${item.complemento || ""}
      </div>

      <div class="col-md-4 mt-2">
        <b>Bairro:</b> ${item.bairro || ""}
      </div>

      <div class="col-md-4 mt-2">
        <b>Cidade:</b> ${item.cidade || ""}
      </div>

      <div class="col-md-4 mt-2">
        <b>Estado:</b> ${item.estado || ""}
      </div>

      <div class="col-md-12 mt-2">
        <b>Referência:</b> ${item.referencia || ""}
      </div>

    </div>

    <hr>

    <h4>Documentação</h4>

    <div class="row">

      <div class="col-md-4 mt-2">
        <b>RG:</b> ${item.rg || ""}
      </div>

      <div class="col-md-4 mt-2">
        <b>CPF:</b> ${item.cpf || ""}
      </div>

      <div class="col-md-4 mt-2">
        <b>Título Eleitor:</b> ${item.titulo_eleitor || ""}
      </div>

      <div class="col-md-3 mt-2">
        <b>Zona:</b> ${item.zona || ""}
      </div>

      <div class="col-md-3 mt-2">
        <b>Seção:</b> ${item.secao || ""}
      </div>

      <div class="col-md-6 mt-2">
        <b>Carteira Trabalho:</b>
        ${item.carteira_trabalho || ""}
      </div>

    </div>

    <hr>

    <h4>Situação Profissional</h4>

    <div class="row">

      <div class="col-md-6 mt-2">
        <b>Situação:</b>
        ${item.situacao_profissional || ""}
      </div>

      <div class="col-md-6 mt-2">
        <b>Tempo Desempregado:</b>
        ${item.tempo_desempregado || ""}
      </div>

    </div>

    <hr>

    <h4>Habitação</h4>

    <div class="row">

      <div class="col-md-4 mt-2">
        <b>Situação Habitacional:</b>
        ${item.situacao_habitacional || ""}
      </div>

      <div class="col-md-4 mt-2">
        <b>Tempo Moradia:</b>
        ${item.tempo_moradia || ""}
      </div>

      <div class="col-md-4 mt-2">
        <b>Cômodos:</b>
        ${item.comodos || ""}
      </div>

      <div class="col-md-6 mt-2">
        <b>Tipo Construção:</b>
        ${item.tipo_construcao || ""}
      </div>

      <div class="col-md-6 mt-2">
        <b>Água:</b>
        ${item.abastecimento_agua || ""}
      </div>

    </div>

    <hr>

    <h4>Despesas</h4>

    <div class="row">

      <div class="col-md-3 mt-2">
        <b>Medicamentos:</b>
        ${item.medicamentos || ""}
      </div>

      <div class="col-md-3 mt-2">
        <b>Gás:</b>
        ${item.gas || ""}
      </div>

      <div class="col-md-3 mt-2">
        <b>Alimentação:</b>
        ${item.alimentacao || ""}
      </div>

      <div class="col-md-3 mt-2">
        <b>Contas:</b>
        ${item.contas || ""}
      </div>

      <div class="col-md-12 mt-2">
        <b>Outras despesas:</b>
        ${item.outras_despesas || ""}
      </div>

    </div>

    <hr>

    <h4>Motivo Atendimento</h4>

    <p>${item.motivo || ""}</p>

    <hr>

    <h4>Observações</h4>

    <p>${item.observacoes || ""}</p>

  `;

  const modal = new bootstrap.Modal(
    document.getElementById("modalFicha")
  );

  modal.show();

}

async function gerarPDF(id){

  const item = atendidos.find(a => a.id == id);

  const { jsPDF } = window.jspdf;

  const doc = new jsPDF();

  let y = 20;

  doc.setFontSize(18);

  doc.text("FICHA SOCIAL - ONG", 60, y);

  y += 20;

  doc.setFontSize(12);

  function linha(texto){

    doc.text(texto, 20, y);

    y += 8;

  }

  linha("Nome: " + (item.nome || ""));
  linha("Filiação: " + (item.filiacao || ""));
  linha("Nascimento: " + (item.nascimento || ""));
  linha("Sexo: " + (item.sexo || ""));
  linha("Estado Civil: " + (item.estado_civil || ""));
  linha("Naturalidade: " + (item.naturalidade || ""));
  linha("Cor/Raça: " + (item.cor || ""));
  linha("CPF: " + (item.cpf || ""));
  linha("RG: " + (item.rg || ""));
  linha("Telefone: " + (item.telefone1 || ""));
  linha("Rua: " + (item.rua || ""));
  linha("Número: " + (item.numero || ""));
  linha("Bairro: " + (item.bairro || ""));
  linha("Cidade: " + (item.cidade || ""));
  linha("Estado: " + (item.estado || ""));
  linha("Referência: " + (item.referencia || ""));

  y += 10;

  linha("Motivo Atendimento:");
  linha(item.motivo || "");

  y += 10;

  linha("Observações:");
  linha(item.observacoes || "");

  y += 30;

  doc.line(20, y, 80, y);
  doc.line(120, y, 180, y);

  y += 5;

  doc.text("Responsável ONG", 25, y);
  doc.text("Atendido", 140, y);

  doc.save("ficha-social.pdf");

}

listar();

</script>

</body>

</html>
